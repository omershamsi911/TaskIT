
<div id="erd" style="padding:8px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',

const diagram = `erDiagram

  users ||--o{ user_loyalty_points : earns

  users ||--o{ notifications : receives
  users ||--o{ wallet_transactions : owns
  users ||--o{ reports : files
  users ||--o{ chats : participates

  providers ||--|| users : "is a"

  providers ||--o{ provider_availability : sets
  providers ||--o{ provider_documents : uploads
  providers ||--o{ provider_badges : earns
  providers ||--o{ bookings : receives
  providers ||--o{ earnings : tracks
  providers ||--o{ reviews : receives
  providers ||--o{ subscription_plans : subscribes

  categories ||--o{ subcategories : has
  subcategories ||--o{ provider_services : belongs_to

  bookings ||--o{ booking_status_history : tracks
  bookings ||--|| payments : has
  bookings ||--o{ job_photos : has
  bookings ||--o{ reviews : generates
  bookings ||--|| chats : has

  payments ||--o{ wallet_transactions : uses

  disputes ||--|| bookings : for

  admin_users ||--o{ disputes : resolves
  admin_users ||--o{ reports : handles

  users {

  providers {

    INT total_completed_jobs
    INT total_cancelled_jobs
    DECIMAL response_rate
    INT avg_response_minutes
    DECIMAL service_radius_km
    DECIMAL lat
    DECIMAL lng
    ENUM availability_status

  categories {

    DATETIME created_at

  addresses {
    BIGINT id PK
    BIGINT user_id FK
    VARCHAR label
    VARCHAR address_line1
    VARCHAR address_line2

    DECIMAL lng

    DATETIME created_at
  }

  bookings {
    BIGINT id PK
    VARCHAR booking_ref UK
    BIGINT user_id FK
    BIGINT provider_id FK
    BIGINT service_id FK
    BIGINT address_id FK
    ENUM status
    TEXT description
    DATETIME scheduled_at
    DATETIME started_at
    DATETIME completed_at
    DECIMAL quoted_price

    DECIMAL platform_fee

    BIGINT booking_id FK

  }

  payments {
    BIGINT id PK
    BIGINT booking_id FK
    BIGINT user_id FK
    DECIMAL amount
    DECIMAL platform_fee
    DECIMAL provider_payout
    ENUM method
    ENUM status
    VARCHAR gateway_txn_id
    TEXT gateway_response
    ENUM escrow_status
    DATETIME escrow_released_at
    DATETIME created_at
    DATETIME updated_at
  }

  wallet_transactions {
    BIGINT id PK

    ENUM type
    DECIMAL amount

  earnings {

  reviews {

  review_helpful_votes {
    BIGINT id PK

    BIGINT user_id FK
    DATETIME created_at
  }

  chats {

    BIGINT user_id FK
    BIGINT provider_id FK

  reports {

  ai_match_logs {

  admin_users {
    INT id PK
    VARCHAR name
    VARCHAR email UK
    VARCHAR password_hash

  platform_settings {

`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
